# C) render.yaml
services:
  - type: web
    name: video-downloader-api
    runtime: image
    repo: https://github.com/yourusername/video-downloader-backend
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: NODE_ENV
        value: production
      - key: TMP_DIR
        value: /app/tmp
      - key: PORT
        value: 3000
    healthCheckPath: /api/health
    autoDeploy: true
    domains:
      - video-downloader-api.onrender.com